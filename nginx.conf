worker_processes auto;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # IMPORTANT: Le DNS interne de Kubernetes pour la résolution dynamique
    resolver 10.43.0.10 valid=30s;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 100M;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript;

    # On utilise une variable pour éviter le crash au démarrage si l'hôte est absent
    server {
        listen 80;
        server_name _;

        # Variables pour les noms d'hôtes (évite le crash au boot)
        set $ollama_dns "ollama.ent-est-sale.svc.cluster.local";
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, Origin' always;

        location = /health {
            return 200 '{"status":"ok"}';
            add_header Content-Type application/json;
        }

        location /api/users {
            rewrite ^/api/users/(.+)$ /users/$1 break;
            rewrite ^/api/users$ /users break;
            proxy_pass http://users-service:8001;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/courses {
            rewrite ^/api/courses/(.+)$ /courses/$1 break;
            rewrite ^/api/courses$ /courses break;
            proxy_pass http://courses-service:8002;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/messages {
            rewrite ^/api/messages/(.+)$ /messages/$1 break;
            rewrite ^/api/messages$ /messages break;
            proxy_pass http://messaging-service:8003;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/calendar {
            rewrite ^/api/calendar/(.+)$ /calendar/$1 break;
            rewrite ^/api/calendar$ /calendar break;
            proxy_pass http://calendar-service:8004;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/chat {
            rewrite ^/api/chat/(.+)$ /chat/$1 break;
            rewrite ^/api/chat$ /chat break;
            proxy_pass http://chat-service:8005;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/exams {
            rewrite ^/api/exams/(.+)$ /exams/$1 break;
            rewrite ^/api/exams$ /exams break;
            proxy_pass http://exams-service:8006;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/notifications {
            rewrite ^/api/notifications/(.+)$ /notifications/$1 break;
            rewrite ^/api/notifications$ /notifications break;
            proxy_pass http://notifications-service:8007;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
        }

        location /api/ollama {
            rewrite ^/api/ollama/(.+)$ /$1 break;
            rewrite ^/api/ollama$ / break;
            
            # Utilisation de la variable pour forcer la résolution dynamique
            proxy_pass http://$ollama_dns:11434;
            
            proxy_http_version 1.1;
            proxy_read_timeout 300s;
            proxy_set_header Authorization $http_authorization;
            proxy_set_header Host $host;

            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Accept, Origin' always;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type, Accept, Origin' always;
                add_header 'Content-Length' 0;
                add_header 'Content-Type' text/plain;
                return 204;
            }
        }

        location /ws/chat/ws {
            rewrite ^/ws/chat/ws/(.*)$ /chat/ws/$1 break;
            proxy_pass http://chat-service:8005;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header Authorization $http_authorization;
            proxy_read_timeout 86400;
        }

        location / {
            proxy_pass http://frontend:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}